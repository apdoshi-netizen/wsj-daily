name: WSJ Daily picks

on:
  schedule:
    # Shots before the 9 AM ET send (13:00 UTC EDT / 14:00 UTC EST). Observed
    # GitHub scheduler delay is 45-110 min, so these are set early. The last
    # tick is a RESCUE run: it regenerates only if the day's picks are still
    # missing/empty (e.g. a run drew a Google-blocked runner IP) — otherwise it
    # exits without spending an API call.
    - cron: '17 8 * * *'
    - cron: '17 10 * * *'
    - cron: '17 11 * * *'   # rescue-only
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate picks.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESCUE_ONLY: ${{ github.event.schedule == '17 11 * * *' && '1' || '' }}
        run: python3 generate.py
      - name: Commit picks.json + history.json if changed
        run: |
          git config user.name "wsj-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add picks.json history.json
          git diff --staged --quiet || git commit -m "picks: $(TZ=America/New_York date +%F)"
          git push
