name: WSJ Daily picks

on:
  schedule:
    # Two shots before the 9 AM ET send (13:00 UTC EDT / 14:00 UTC EST), for
    # redundancy — GitHub's scheduler can delay or skip an individual tick. The
    # later run overwrites picks.json, so the freshest good run before send wins.
    # 10:17 and 12:17 UTC = ~6:17 and 8:17 AM EDT (5:17 / 7:17 AM EST).
    - cron: '17 10,12 * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate picks.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate.py
      - name: Commit picks.json + history.json if changed
        run: |
          git config user.name "wsj-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add picks.json history.json
          git diff --staged --quiet || git commit -m "picks: $(TZ=America/New_York date +%F)"
          git push
