name: WSJ Daily picks

on:
  schedule:
    # Multiple shots before the 9 AM ET send (13:00 UTC EDT / 14:00 UTC EST), for
    # redundancy — GitHub's scheduler can delay or skip an individual tick. Each
    # run overwrites picks.json, so the latest good one before 9 AM ET wins.
    # 06:17, 09:17, 11:17, 12:17 UTC = ~2:17 / 5:17 / 7:17 / 8:17 AM EDT.
    - cron: '17 6,9,11,12 * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate picks.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate.py
      - name: Commit picks.json if changed
        run: |
          git config user.name "wsj-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add picks.json
          git diff --staged --quiet || git commit -m "picks: $(TZ=America/New_York date +%F)"
          git push
